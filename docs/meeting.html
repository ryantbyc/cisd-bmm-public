<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Meeting — CISD Monitor</title>
  <!-- Apply saved preferences before render to prevent flash -->
  <script>
    (function(){
      var f = parseInt(localStorage.getItem('cisd-font-size')) || 17;
      var t = localStorage.getItem('cisd-theme') || 'light';
      document.documentElement.style.fontSize = f + 'px';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg-page:          #f4f6f9;
      --bg-card:          #ffffff;
      --bg-header:        #1a3a5c;
      --bg-disclaimer:    #fff8e8;
      --bg-section-label: #e8f0fe;
      --bg-section-hover: #d4e4fc;
      --bg-section-coll:  #f0f4fa;
      --bg-ctrl:          #f0f4fa;
      --bg-ctrl-hover:    #dce8f8;
      --bg-detail:        #fafbfd;
      --bg-summary-hover: #f5f7fb;
      --bg-vote:          #f0faf4;
      --bg-proc-item:     #f0f4fa;
      --bg-table-th:      #1a3a5c;
      --bg-table-stripe:  #f7f9fd;
      --bg-blockquote:    #fff8e8;
      --text-primary:     #1a1a2e;
      --text-secondary:   #666;
      --text-header:      #ffffff;
      --text-disclaimer:  #7a5a00;
      --text-section:     #1a3a5c;
      --text-section-sub: #2a4a7c;
      --text-section-3:   #3a5a8c;
      --text-section-coll:#4a6a9c;
      --text-item-num:    #8899bb;
      --text-detail:      #333;
      --text-no-history:  #999;
      --text-vote:        #1a7a3c;
      --text-blockquote:  #7a5a00;
      --text-footer:      #888;
      --border-accent:    #e8a020;
      --border-tabs:      #dce3ef;
      --border-ctrl:      #c8d8f0;
      --border-subtle:    #eef0f5;
      --border-table:     #e8ecf4;
      --border-section-coll: #9ab0d0;
      --shadow-card:      0 1px 3px rgba(0,0,0,0.07);
      --ctrl-bg:          rgba(255,255,255,0.15);
      --ctrl-bg-hover:    rgba(255,255,255,0.28);
      --ctrl-border:      rgba(255,255,255,0.3);
      --ctrl-text:        #ffffff;
    }

    [data-theme="dark"] {
      --bg-page:          #0f1117;
      --bg-card:          #1a1d27;
      --bg-header:        #0a1929;
      --bg-disclaimer:    #1e1a08;
      --bg-section-label: #142040;
      --bg-section-hover: #1a2a50;
      --bg-section-coll:  #141e30;
      --bg-ctrl:          #1a2440;
      --bg-ctrl-hover:    #223060;
      --bg-detail:        #141822;
      --bg-summary-hover: #1c2130;
      --bg-vote:          #0f2018;
      --bg-proc-item:     #141e30;
      --bg-table-th:      #0e2040;
      --bg-table-stripe:  #161a26;
      --bg-blockquote:    #1e1a08;
      --text-primary:     #e2e8f4;
      --text-secondary:   #8a9ec0;
      --text-header:      #ffffff;
      --text-disclaimer:  #c8a840;
      --text-section:     #88aadd;
      --text-section-sub: #6a9ade;
      --text-section-3:   #7a9aca;
      --text-section-coll:#4a6a99;
      --text-item-num:    #4a6a99;
      --text-detail:      #ccd4e8;
      --text-no-history:  #556070;
      --text-vote:        #4acc80;
      --text-blockquote:  #c8a840;
      --text-footer:      #5a6a88;
      --border-tabs:      #2a3a52;
      --border-ctrl:      #2a4a7c;
      --border-subtle:    #252a3a;
      --border-table:     #252a3a;
      --border-section-coll: #2a3a60;
      --shadow-card:      0 1px 4px rgba(0,0,0,0.4);
      --ctrl-bg:          rgba(255,255,255,0.1);
      --ctrl-bg-hover:    rgba(255,255,255,0.2);
      --ctrl-border:      rgba(255,255,255,0.2);
    }

    /* ── Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 17px; /* overridden by JS */ }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      background: var(--bg-header);
      color: var(--text-header);
      padding: 1.25rem 1.5rem;
      border-bottom: 4px solid var(--border-accent);
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .header-brand a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.9rem; }
    .header-brand a:hover { color: white; }
    .header-brand h1 { font-size: 1.4rem; font-weight: 700; margin-top: 0.35rem; }
    .header-brand .meta { font-size: 0.88rem; opacity: 0.8; margin-top: 0.25rem; }

    /* ── Page controls ─────────────────────────────────────────── */
    .page-controls {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
      padding-top: 0.2rem;
    }

    .hctrl-btn {
      background: var(--ctrl-bg);
      color: var(--ctrl-text);
      border: 1px solid var(--ctrl-border);
      border-radius: 5px;
      padding: 0.3rem 0.65rem;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s;
      line-height: 1;
      min-width: 2.4rem;
      text-align: center;
    }

    .hctrl-btn:hover { background: var(--ctrl-bg-hover); }

    /* ── Disclaimer ────────────────────────────────────────────── */
    .disclaimer {
      background: var(--bg-disclaimer);
      border-left: 4px solid var(--border-accent);
      padding: 0.65rem 1.25rem;
      font-size: 0.82rem;
      color: var(--text-disclaimer);
    }

    /* ── Main ──────────────────────────────────────────────────── */
    main { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem 3rem; }

    /* ── Tabs ──────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border-tabs);
    }

    .tab-btn {
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }

    .tab-btn.active { color: var(--text-section); border-bottom-color: var(--border-accent); }
    .tab-btn:hover:not(.active) { color: var(--text-section); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Section controls bar ──────────────────────────────────── */
    .section-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: var(--bg-card);
      border-radius: 6px;
      box-shadow: var(--shadow-card);
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .section-controls span { margin-right: 0.25rem; }

    .ctrl-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--bg-ctrl);
      color: var(--text-section);
      border: 1px solid var(--border-ctrl);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .ctrl-btn:hover { background: var(--bg-ctrl-hover); }

    /* ── Section headers ───────────────────────────────────────── */
    .section-label {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-section);
      background: var(--bg-section-label);
      border-left: 4px solid var(--text-section);
      padding: 0.45rem 0.85rem;
      margin: 2rem 0 0;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      user-select: none;
      transition: background 0.12s;
    }

    .section-label:first-child { margin-top: 0; }
    .section-label:hover { background: var(--bg-section-hover); }
    .section-label.collapsed {
      background: var(--bg-section-coll);
      color: var(--text-section-coll);
      border-left-color: var(--border-section-coll);
    }

    .section-arrow {
      font-size: 0.65rem;
      transition: transform 0.18s;
      display: inline-block;
      flex-shrink: 0;
    }

    .section-label.collapsed .section-arrow { transform: rotate(-90deg); }

    .section-items { margin-bottom: 0.5rem; padding-top: 0.65rem; }
    .section-items.collapsed { display: none; }

    /* ── Agenda items ──────────────────────────────────────────── */
    .agenda-item {
      background: var(--bg-card);
      border-radius: 8px;
      box-shadow: var(--shadow-card);
      margin-bottom: 0.6rem;
      overflow: hidden;
    }

    .item-header { padding: 1rem 1.25rem; }

    .item-number {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-item-num);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .item-title {
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .item-dropdowns {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border-subtle);
    }

    details {
      flex: 1;
      border-right: 1px solid var(--border-subtle);
    }

    details:last-child { border-right: none; }

    details summary {
      padding: 0.55rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-section);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      list-style: none;
      user-select: none;
      transition: background 0.1s;
    }

    details summary::-webkit-details-marker { display: none; }

    details summary::before {
      content: "▸";
      font-size: 0.7rem;
      transition: transform 0.15s;
      display: inline-block;
    }

    details[open] summary::before { transform: rotate(90deg); }
    details summary:hover { background: var(--bg-summary-hover); }

    .detail-body {
      padding: 0.75rem 1rem 1rem;
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text-detail);
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-detail);
    }

    .detail-body.no-history { color: var(--text-no-history); font-style: italic; }

    .vote-row {
      padding: 0.4rem 1.25rem;
      font-size: 0.82rem;
      color: var(--text-vote);
      font-weight: 600;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-vote);
    }

    /* ── Meeting notes ─────────────────────────────────────────── */
    .notes-body {
      background: var(--bg-card);
      border-radius: 8px;
      box-shadow: var(--shadow-card);
      padding: 1.75rem 2rem;
      font-size: 0.92rem;
      line-height: 1.7;
    }

    .notes-body h1 {
      font-size: 1.3rem;
      color: var(--text-section);
      margin: 1.5rem 0 0.6rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border-tabs);
    }

    .notes-body h3 { font-size: 1rem; color: var(--text-section-sub); margin: 1.1rem 0 0.4rem; }
    .notes-body h4 { font-size: 0.95rem; color: var(--text-section-3); margin: 0.9rem 0 0.3rem; }

    .notes-body p { margin-bottom: 0.75rem; }

    .notes-body ul, .notes-body ol {
      margin: 0.4rem 0 0.75rem 1.5rem;
    }

    .notes-body li { margin-bottom: 0.25rem; }

    .notes-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.88rem;
    }

    .notes-body th {
      background: var(--bg-table-th);
      color: white;
      padding: 0.5rem 0.75rem;
      text-align: left;
    }

    .notes-body td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid var(--border-table);
    }

    .notes-body tr:nth-child(even) td { background: var(--bg-table-stripe); }

    .notes-body blockquote {
      border-left: 4px solid var(--border-accent);
      margin: 0.75rem 0;
      padding: 0.5rem 1rem;
      background: var(--bg-blockquote);
      color: var(--text-blockquote);
      font-size: 0.88rem;
    }

    .notes-body strong { color: var(--text-primary); }
    .notes-body hr { border: none; border-top: 1px solid var(--border-tabs); margin: 1.25rem 0; }

    /* ── Procedural items ──────────────────────────────────────── */
    .procedural-list {
      background: var(--bg-card);
      border-radius: 8px;
      box-shadow: var(--shadow-card);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .procedural-list p {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-item-num);
      margin-bottom: 0.5rem;
    }

    .procedural-list ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .procedural-list li {
      font-size: 0.82rem;
      background: var(--bg-proc-item);
      color: var(--text-section-coll);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }

    #loading-msg { text-align: center; padding: 3rem; color: var(--text-secondary); }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-footer);
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="header-brand">
      <a href="index.html">&#8592; All Meetings</a>
      <h1 id="page-title">Loading meeting...</h1>
      <div class="meta" id="page-meta"></div>
    </div>
    <div class="page-controls">
      <button class="hctrl-btn" id="font-down" title="Decrease font size">A−</button>
      <button class="hctrl-btn" id="font-up" title="Increase font size">A+</button>
      <button class="hctrl-btn" id="theme-toggle" title="Toggle dark mode">☾</button>
    </div>
  </div>
</header>

<div class="disclaimer">
  Unofficial summaries based on public agendas and auto-generated transcripts. Not affiliated with or endorsed by Conroe ISD.
</div>

<main>
  <div id="loading-msg">Loading meeting data...</div>
  <div id="content" style="display:none">

    <div class="tabs" id="tabs"></div>

    <div id="tab-agenda" class="tab-panel active">
      <div id="procedural-section"></div>
      <div id="section-controls" class="section-controls" style="display:none">
        <span>Sections:</span>
        <button class="ctrl-btn" id="btn-expand-all">Expand All</button>
        <button class="ctrl-btn" id="btn-collapse-all">Collapse All</button>
      </div>
      <div id="agenda-items"></div>
    </div>

    <div id="tab-notes" class="tab-panel">
      <div id="notes-controls" class="section-controls" style="display:none">
        <span>Sections:</span>
        <button class="ctrl-btn" id="btn-notes-expand">Expand All</button>
        <button class="ctrl-btn" id="btn-notes-collapse">Collapse All</button>
      </div>
      <div class="notes-body" id="notes-body"></div>
    </div>

  </div>
</main>

<footer>
  CISD Board Meeting Monitor &mdash; Unofficial constituent resource
</footer>

<script>
  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const FONT_MIN = 13, FONT_MAX = 22, FONT_DEFAULT = 17;

  function applyFont(size) {
    document.documentElement.style.fontSize = size + 'px';
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀' : '☾';
  }

  // Init controls from localStorage
  applyFont(parseInt(localStorage.getItem('cisd-font-size')) || FONT_DEFAULT);
  applyTheme(localStorage.getItem('cisd-theme') || 'light');

  document.getElementById('font-up').addEventListener('click', () => {
    const next = Math.min((parseInt(localStorage.getItem('cisd-font-size')) || FONT_DEFAULT) + 1, FONT_MAX);
    localStorage.setItem('cisd-font-size', next);
    applyFont(next);
  });

  document.getElementById('font-down').addEventListener('click', () => {
    const next = Math.max((parseInt(localStorage.getItem('cisd-font-size')) || FONT_DEFAULT) - 1, FONT_MIN);
    localStorage.setItem('cisd-font-size', next);
    applyFont(next);
  });

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('cisd-theme', next);
    applyTheme(next);
  });

  // ── Meeting content ───────────────────────────────────────────

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function buildTabs(hasAgenda, hasNotes) {
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';
    const panels = [];

    if (hasAgenda) {
      const btn = document.createElement('button');
      btn.className = 'tab-btn active';
      btn.textContent = 'Agenda Breakdown';
      btn.dataset.target = 'tab-agenda';
      tabsEl.appendChild(btn);
      panels.push('tab-agenda');
    }

    if (hasNotes) {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (hasAgenda ? '' : ' active');
      btn.textContent = 'Meeting Notes';
      btn.dataset.target = 'tab-notes';
      tabsEl.appendChild(btn);
      panels.push('tab-notes');
    }

    tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        panels.forEach(id => document.getElementById(id).classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });

    if (!hasAgenda && hasNotes) {
      document.getElementById('tab-notes').classList.add('active');
      document.getElementById('tab-agenda').classList.remove('active');
    }
  }

  // Tracks all { label, wrapper } pairs for expand/collapse all
  const allSections = [];

  function toggleSection(label, wrapper, forceOpen) {
    const opening = forceOpen !== undefined ? forceOpen : label.classList.contains('collapsed');
    if (opening) {
      label.classList.remove('collapsed');
      wrapper.classList.remove('collapsed');
    } else {
      label.classList.add('collapsed');
      wrapper.classList.add('collapsed');
    }
  }

  function renderAgenda(sections) {
    const container = document.getElementById('agenda-items');
    const proceduralEl = document.getElementById('procedural-section');
    const controls = document.getElementById('section-controls');
    container.innerHTML = '';
    allSections.length = 0;

    // Split procedural (no context/history) from substantive items
    const proceduralItems = [];
    const substantiveSections = [];

    sections.forEach(sec => {
      const proc = sec.items.filter(i => !i.context && !i.history);
      const subs = sec.items.filter(i => i.context || i.history);
      proc.forEach(i => proceduralItems.push(i));
      if (subs.length) substantiveSections.push({ name: sec.name, items: subs });
    });

    if (proceduralItems.length) {
      proceduralEl.innerHTML = `
        <div class="procedural-list">
          <p>Procedural Items</p>
          <ul>${proceduralItems.map(i => `<li><strong>${i.id}</strong> ${i.title}</li>`).join('')}</ul>
        </div>`;
    }

    substantiveSections.forEach(sec => {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.innerHTML = `<span class="section-arrow">▾</span>${sec.name}`;

      const wrapper = document.createElement('div');
      wrapper.className = 'section-items';

      allSections.push({ label, wrapper });
      label.addEventListener('click', () => toggleSection(label, wrapper));

      sec.items.forEach(item => {
        const isNoHistory = !item.history || item.history.trim().toLowerCase().startsWith('no prior history');
        const voteHtml = item.vote
          ? `<div class="vote-row">Vote: ${item.vote}</div>`
          : '';

        const card = document.createElement('div');
        card.className = 'agenda-item';
        card.innerHTML = `
          <div class="item-header">
            ${item.id ? `<div class="item-number">${item.id}</div>` : ''}
            <div class="item-title">${item.title}</div>
          </div>
          ${voteHtml}
          <div class="item-dropdowns">
            ${item.context ? `
            <details open>
              <summary>Context</summary>
              <div class="detail-body">${item.context}</div>
            </details>` : ''}
            <details open>
              <summary>History</summary>
              <div class="detail-body ${isNoHistory ? 'no-history' : ''}">${item.history || 'No prior history available yet.'}</div>
            </details>
          </div>`;
        wrapper.appendChild(card);
      });

      container.appendChild(label);
      container.appendChild(wrapper);
    });

    // Show controls bar if there are multiple sections
    if (allSections.length > 1) {
      controls.style.display = 'flex';
      document.getElementById('btn-expand-all').onclick = () =>
        allSections.forEach(s => toggleSection(s.label, s.wrapper, true));
      document.getElementById('btn-collapse-all').onclick = () =>
        allSections.forEach(s => toggleSection(s.label, s.wrapper, false));
    }
  }

  // Tracks all note sections for expand/collapse all
  const allNotesSections = [];

  function buildNotesSection(container, headingText, nodes) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.innerHTML = `<span class="section-arrow">▾</span>${headingText}`;

    const wrapper = document.createElement('div');
    wrapper.className = 'section-items';
    nodes.forEach(n => wrapper.appendChild(n));

    allNotesSections.push({ label, wrapper });
    label.addEventListener('click', () => toggleSection(label, wrapper));
    container.appendChild(label);
    container.appendChild(wrapper);
  }

  function processNoteSections(container) {
    // Snapshot children before clearing
    const nodes = Array.from(container.childNodes);
    container.innerHTML = '';
    allNotesSections.length = 0;

    let preamble = [];
    let currentHeading = null;
    let currentItems = [];

    nodes.forEach(node => {
      const isH2 = node.nodeType === 1 && node.tagName === 'H2';
      if (isH2) {
        if (currentHeading !== null) {
          buildNotesSection(container, currentHeading, currentItems);
          currentItems = [];
        } else {
          // Flush any preamble nodes (content before the first H2)
          preamble.forEach(n => container.appendChild(n));
          preamble = [];
        }
        currentHeading = node.textContent.trim();
      } else {
        if (currentHeading === null) {
          preamble.push(node);
        } else {
          currentItems.push(node);
        }
      }
    });

    // Flush final section or remaining preamble
    if (currentHeading !== null) {
      buildNotesSection(container, currentHeading, currentItems);
    } else {
      preamble.forEach(n => container.appendChild(n));
    }

    // Show controls if there are multiple sections
    const ctrl = document.getElementById('notes-controls');
    if (allNotesSections.length > 1) {
      ctrl.style.display = 'flex';
      document.getElementById('btn-notes-expand').onclick = () =>
        allNotesSections.forEach(s => toggleSection(s.label, s.wrapper, true));
      document.getElementById('btn-notes-collapse').onclick = () =>
        allNotesSections.forEach(s => toggleSection(s.label, s.wrapper, false));
    }
  }

  function renderNotes(markdown) {
    const notesEl = document.getElementById('notes-body');
    if (typeof marked !== 'undefined') {
      notesEl.innerHTML = marked.parse(markdown);
    } else {
      notesEl.innerHTML = '<pre style="white-space:pre-wrap">' + markdown + '</pre>';
    }
    processNoteSections(notesEl);
  }

  const meetingId = getParam('id');
  if (!meetingId) {
    document.getElementById('loading-msg').textContent = 'No meeting specified.';
  } else {
    fetch(`data/${meetingId}.json`)
      .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(data => {
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        document.title = `${data.date_display} — CISD Monitor`;
        document.getElementById('page-title').textContent =
          `Board of Trustees — ${data.type_display}`;
        document.getElementById('page-meta').textContent = data.date_display;

        buildTabs(data.has_agenda, data.has_notes);

        if (data.has_agenda && data.sections) {
          renderAgenda(data.sections);
        }

        if (data.has_notes && data.meeting_notes_md) {
          renderNotes(data.meeting_notes_md);
        }
      })
      .catch(() => {
        document.getElementById('loading-msg').textContent =
          'Could not load meeting data. The meeting may not be published yet.';
      });
  }
</script>

</body>
