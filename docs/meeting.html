<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CISD Board Meeting — Loading…</title>
  <!-- Lightweight Markdown renderer from CDN (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:     #1a3a5c;
      --blue-lt:  #e8eef6;
      --gold:     #c8973a;
      --green:    #15803d;
      --green-lt: #dcfce7;
      --bg:       #f5f6f8;
      --card:     #ffffff;
      --border:   #dde1e7;
      --text:     #1c2028;
      --muted:    #6b7280;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Top nav */
    .top-nav {
      background: var(--blue);
      padding: 0.75rem 1rem;
    }
    .top-nav a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .top-nav a:hover { color: #fff; text-decoration: underline; }

    /* Header */
    header {
      background: var(--blue);
      color: #fff;
      padding: 1.25rem 1rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header .subtitle {
      margin-top: 0.3rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    /* Disclaimer */
    .disclaimer {
      background: #fffbeb;
      border-bottom: 2px solid var(--gold);
      padding: 0.55rem 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: #78350f;
    }

    /* Layout */
    main {
      max-width: 800px;
      margin: 1.5rem auto 3rem;
      padding: 0 1rem;
    }

    /* Tab bar (Agenda Breakdown / Meeting Notes) */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .tab-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Section label */
    h2.section-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 1.5rem 0 0.6rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    h2.section-label:first-child { border-top: none; margin-top: 0; }

    /* Agenda item card */
    .agenda-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }

    .item-header {
      padding: 0.85rem 1rem;
    }
    .item-id {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.2rem;
    }
    .item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .item-vote {
      display: inline-block;
      margin-top: 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--green);
      background: var(--green-lt);
      border-radius: 999px;
      padding: 0.15rem 0.6rem;
    }

    /* <details> dropdowns */
    .item-details {
      border-top: 1px solid var(--border);
    }

    details {
      border-top: 1px solid var(--border);
    }
    details:first-child { border-top: none; }

    summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--blue);
      user-select: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after {
      content: "›";
      font-size: 1.1rem;
      transition: transform 0.2s;
      display: inline-block;
    }
    details[open] > summary::after {
      transform: rotate(90deg);
    }

    .detail-body {
      padding: 0.75rem 1rem 0.9rem;
      font-size: 0.88rem;
      color: #374151;
      background: #fafbfc;
      border-top: 1px solid var(--border);
    }
    .detail-body p { margin-bottom: 0.5rem; }
    .detail-body p:last-child { margin-bottom: 0; }

    /* Procedural items compact list */
    .procedural-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .procedural-list li { margin-left: 1.2rem; margin-bottom: 0.15rem; }

    /* Meeting Notes tab — rendered markdown */
    .notes-body {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .notes-body h1, .notes-body h2 {
      color: var(--blue);
      margin: 1.2rem 0 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .notes-body h1 { font-size: 1.2rem; }
    .notes-body h2 { font-size: 1rem; }
    .notes-body h3 { font-size: 0.95rem; color: #374151; margin: 1rem 0 0.3rem; }
    .notes-body p  { margin-bottom: 0.6rem; }
    .notes-body ul, .notes-body ol { margin: 0.4rem 0 0.6rem 1.4rem; }
    .notes-body li { margin-bottom: 0.2rem; }
    .notes-body table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 0.75rem 0;
    }
    .notes-body th, .notes-body td {
      border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left;
    }
    .notes-body th { background: var(--blue-lt); color: var(--blue); font-weight: 700; }
    .notes-body blockquote {
      border-left: 3px solid var(--gold); padding-left: 1rem;
      color: var(--muted); margin: 0.75rem 0; font-style: italic;
    }
    .notes-body code {
      background: #f3f4f6; padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.85em;
    }

    /* Status */
    .status-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); }

    @media (max-width: 480px) {
      .notes-body { padding: 0.9rem 1rem; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html">← All Meetings</a>
</nav>

<header>
  <h1 id="page-title">Conroe ISD Board Meeting</h1>
  <div class="subtitle" id="page-subtitle">Loading…</div>
</header>

<div class="disclaimer">
  ⚠ Unofficial — AI-generated content. Not affiliated with Conroe ISD. May contain errors.
</div>

<main id="main-content">
  <p class="status-msg">Loading meeting data…</p>
</main>

<footer>
  <p>Not an official Conroe ISD publication.</p>
  <p style="margin-top:0.25rem">
    For official records visit <a href="https://www.conroeisd.net" target="_blank" rel="noopener">conroeisd.net</a>.
  </p>
</footer>

<script>
  // ---- Helpers ----

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderMarkdown(md) {
    if (typeof marked === 'undefined') return `<pre>${escapeHtml(md)}</pre>`;
    return marked.parse(md);
  }

  // ---- Render agenda breakdown tab ----

  function renderAgendaTab(meeting) {
    if (!meeting.has_agenda || !meeting.sections || meeting.sections.length === 0) {
      return '<p class="status-msg">No agenda breakdown available for this meeting.</p>';
    }

    let html = '';
    for (const section of meeting.sections) {
      if (!section.items || section.items.length === 0) continue;

      const isProc = section.name.toLowerCase().includes('procedural');
      html += `<h2 class="section-label">${escapeHtml(section.name)}</h2>`;

      if (isProc) {
        html += '<ul class="procedural-list">';
        for (const item of section.items) {
          html += `<li><strong>${escapeHtml(item.id)}.</strong> ${escapeHtml(item.title)}</li>`;
        }
        html += '</ul>';
        continue;
      }

      for (const item of section.items) {
        const hasContext = item.context && item.context.trim();
        const hasHistory = item.history && item.history.trim();

        html += `<div class="agenda-item">`;
        html += `<div class="item-header">`;
        html += `<div class="item-id">${escapeHtml(item.id)}</div>`;
        html += `<div class="item-title">${escapeHtml(item.title)}</div>`;
        if (item.vote) {
          html += `<span class="item-vote">Vote: ${escapeHtml(item.vote)}</span>`;
        }
        html += `</div>`; // .item-header

        if (hasContext || hasHistory) {
          html += `<div class="item-details">`;
          if (hasContext) {
            html += `<details>
              <summary>Context</summary>
              <div class="detail-body">${renderMarkdown(item.context)}</div>
            </details>`;
          }
          if (hasHistory) {
            html += `<details>
              <summary>Historical Background</summary>
              <div class="detail-body">${renderMarkdown(item.history)}</div>
            </details>`;
          }
          html += `</div>`; // .item-details
        }

        html += `</div>`; // .agenda-item
      }
    }
    return html;
  }

  // ---- Render meeting notes tab ----

  function renderNotesTab(meeting) {
    if (!meeting.has_notes || !meeting.meeting_notes_md) {
      return '<p class="status-msg">No meeting notes available for this meeting.</p>';
    }
    return `<div class="notes-body">${renderMarkdown(meeting.meeting_notes_md)}</div>`;
  }

  // ---- Tab switching ----

  function activateTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tabId);
    });
    document.querySelectorAll('.tab-panel').forEach(panel => {
      panel.classList.toggle('active', panel.id === tabId);
    });
  }

  // ---- Main render ----

  function renderMeeting(meeting) {
    document.title = `CISD — ${meeting.date_display} ${meeting.type_display}`;
    document.getElementById('page-title').textContent = meeting.title || 'Board Meeting';
    document.getElementById('page-subtitle').textContent =
      `${meeting.type_display} · ${meeting.date_display}`;

    const agendaHtml = renderAgendaTab(meeting);
    const notesHtml = renderNotesTab(meeting);

    const main = document.getElementById('main-content');
    main.innerHTML = `
      <div class="tabs">
        <button class="tab-btn active"
                data-tab="tab-agenda"
                ${!meeting.has_agenda ? 'disabled' : ''}
                onclick="activateTab('tab-agenda')">
          Agenda Breakdown
        </button>
        <button class="tab-btn"
                data-tab="tab-notes"
                ${!meeting.has_notes ? 'disabled' : ''}
                onclick="activateTab('tab-notes')">
          Meeting Notes
        </button>
      </div>

      <div id="tab-agenda" class="tab-panel active">
        ${agendaHtml}
      </div>

      <div id="tab-notes" class="tab-panel">
        ${notesHtml}
      </div>
    `;

    // Auto-switch to notes if no agenda
    if (!meeting.has_agenda && meeting.has_notes) {
      activateTab('tab-notes');
    }
  }

  // ---- Fetch and render ----

  const params = new URLSearchParams(window.location.search);
  const meetingId = params.get('id');

  if (!meetingId) {
    document.getElementById('main-content').innerHTML =
      '<p class="status-msg">No meeting ID specified. <a href="index.html">Return to list</a></p>';
  } else {
    fetch(`data/${encodeURIComponent(meetingId)}.json`)
      .then(r => {
        if (!r.ok) throw new Error(`Meeting not found (HTTP ${r.status})`);
        return r.json();
      })
      .then(renderMeeting)
      .catch(err => {
        document.getElementById('main-content').innerHTML =
          `<p class="status-msg">Could not load meeting: ${escapeHtml(err.message)}.
           <a href="index.html">Return to list</a></p>`;
      });
  }
</script>

</body>
</html>
